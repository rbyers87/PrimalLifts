name: Deploy PrimalLifts to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID=${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_APP_URL=https://${{ github.repository_owner }}.github.io/PrimalLifts/
          EOF

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.VITE_ONESIGNAL_APP_ID }}

      - name: Copy static assets to dist
        run: |
          # Copy icons folder if it exists
          if [ -d "icons" ]; then
            cp -r icons dist/
            echo "✅ Copied icons folder"
          fi
          
          # Copy manifest.json if it exists
          if [ -f "manifest.json" ]; then
            cp manifest.json dist/
            echo "✅ Copied manifest.json"
          fi
          
          # Copy any other root static files
          if [ -f "OneSignalSDKWorker.js" ]; then
            cp OneSignalSDKWorker.js dist/
            echo "✅ Copied OneSignalSDKWorker.js"
          fi
          
          # Show what's in dist for debugging
          echo "📁 Dist contents:"
          ls -la dist/
          if [ -d "dist/icons" ]; then
            echo "📁 Icons contents:"
            ls -la dist/icons/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy PrimalLifts - ${{ github.event.head_commit.message }}'

      - name: Deployment complete
        run: |
          echo "✅ Deployment completed!"
          echo ""
          echo "🌐 Your site will be available at:"
          echo "   https://${{ github.repository_owner }}.github.io/PrimalLifts/"
          echo ""
          echo "⏱️  It may take 1-3 minutes for GitHub Pages to update."
          echo ""
          echo "🔍 Check deployment at:"
          echo "   https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/deployments"
