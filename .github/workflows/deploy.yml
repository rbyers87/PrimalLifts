name: Deploy Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ADD THESE PERMISSIONS (GitHub now requires explicit permissions)
permissions:
  contents: write
  pages: write
  id-token: write

# ADD THIS to prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create environment variables
        run: |
          # Create .env file for build process
          cat > .env << EOF
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID=${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_APP_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/scheduler/
          EOF
          
          echo "✅ Environment file created"

      - name: Install dependencies
        run: |
          npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ONESIGNAL_APP_ID: ${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_APP_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/scheduler/

     
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Post-Deployment Test
        run: |
          echo "🌐 Deployment completed!"
          echo ""
          echo "===== TEST YOUR DEPLOYMENT ====="
          echo ""
          echo "1. Open your deployed site:"
          echo "   https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/PrimalLifts/"
          echo ""
