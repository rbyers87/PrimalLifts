<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primal Lifts</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="index.css">

  <!-- OneSignal Notifications (REMOVED) -->

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="shortcut icon" href="/icons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />



  <!-- PWA Meta Tags -->
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/icons/ms-icon-144x144.png">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <!-- SheetJS CDN for Excel Parsing -->
  <script src="https://cdn.sheetjs.com/package/dist/sheetjs.min.js"></script>

</head>

<body class="bg-lightBackground text-lightText dark:bg-darkBackground dark:text-darkText">
  <div id="root"></div>
  <!-- File Upload Interface Placeholder -->
  <div id="excel-upload-container"
    class="p-4 bg-gray-100 dark:bg-gray-800 rounded-lg shadow my-4 border border-dashed border-gray-300 dark:border-gray-600">
    <h3 class="text-xl font-semibold mb-3">Data Storage Input</h3>
    <p class="text-sm text-gray-600 mb-3">Upload a master Excel file containing records to initialize local IndexedDB
      storage.</p>
    <input type="file" id="excelFileInput" accept=".xlsx, .xls" class="p-1 border border-gray-300 rounded-md">
    <button id="loadDataButton"
      class="mt-3 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50">Load Data from
      Excel</button>
    <p id="dataStatusMessage" class="mt-2 text-sm text-green-600">Awaiting data load...</p>
  </div>
  <script type="module" src="/src/main.tsx"></script>


  <!-- Load UserScripts -->
  <script type="module" src="userscripts.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>
    /** @ts-ignore */
    eruda.init();
  </script>

  <script type="module" src="main.js"></script>
</body>

</html>
